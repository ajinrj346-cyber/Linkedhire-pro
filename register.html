<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
<div class="logo">LinkedHire Pro</div>
</nav>

<div class="auth-container">

<div class="auth-card">

<h2>Create Account</h2>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="registerUser()">
Register
</button>

<p>
Already have an account?

<a href="login.html">
Login
</a>

</p>

</div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
